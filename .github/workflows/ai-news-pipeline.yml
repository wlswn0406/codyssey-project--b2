name: AI News Pipeline

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Collect up to 2 test articles'
        required: false
        default: 'false'
      collect_limit:
        description: 'Max articles to collect in test mode'
        required: false
        default: '2'

env:
  TZ: Asia/Seoul

jobs:
  collect:
    name: 1. 기사 수집 (Collect)
    runs-on: ubuntu-latest
    outputs:
      has_articles: ${{ steps.collect_state.outputs.has_articles }}
      article_count: ${{ steps.collect_state.outputs.article_count }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install feedparser requests beautifulsoup4
      - name: Run Collect
        working-directory: ./유진주-github
        env:
          COLLECT_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode || 'false' }}
          COLLECT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.collect_limit || '2' }}
        run: python src/collect.py
      - name: Detect Collected Articles
        id: collect_state
        shell: bash
        run: |
          today=$(date +%Y%m%d)
          collect_file=$(ls -1t ./유진주-github/logs/${today}-수집.txt 2>/dev/null | head -n 1 || true)
          if [ -z "$collect_file" ]; then
            echo "article_count=0" >> "$GITHUB_OUTPUT"
            echo "has_articles=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          count=$(grep -c '^\[TITLE\] ' "$collect_file" || true)
          echo "article_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_articles=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_articles=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-collect
          path: ./유진주-github/logs/
          if-no-files-found: ignore

  evaluate:
    name: 2. 중요도 평가 (Evaluate)
    needs: collect
    if: needs.collect.outputs.has_articles == 'true'
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install google-genai requests beautifulsoup4
      - name: Download Logs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: logs-collect
          path: ./유진주-github/logs/
      - name: Run Evaluate
        working-directory: ./유진주-github
        run: python src/evaluate.py
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-evaluate
          path: ./유진주-github/logs/
          if-no-files-found: ignore

  summarize:
    name: 3. 요약 생성 (Summarize)
    needs: evaluate
    if: needs.collect.outputs.has_articles == 'true'
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install google-genai
      - name: Download Logs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: logs-evaluate
          path: ./유진주-github/logs/
      - name: Run Summarize
        working-directory: ./유진주-github
        run: python src/summarize.py
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-summarize
          path: ./유진주-github/logs/
          if-no-files-found: ignore

  publish:
    name: 4. 문서 발행 (Publish)
    needs: summarize
    if: needs.collect.outputs.has_articles == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Download Logs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: logs-summarize
          path: ./유진주-github/logs/
      - name: Run Publish
        working-directory: ./유진주-github
        run: python src/publish.py
      - name: Commit and Push
        working-directory: ./유진주-github
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/ *-발행/*.md || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: AI 뉴스 리포트 자동 업데이트" && git push)
